[tool.pytest.ini_options]
pythonpath = ["job-worker"]
testpaths = ["job-worker/tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# Pyflakes (F) + the high-signal pycodestyle subsets (syntax, undefined names,
# unused imports/vars). Line length is intentionally not enforced.
select = ["E4", "E7", "E9", "F"]
